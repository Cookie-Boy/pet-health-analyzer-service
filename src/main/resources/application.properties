spring.application.name=pet_health_analyzer
spring.data.mongodb.uri=mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/vet-clinic
server.port=8084

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/clinic-realm}
spring.security.oauth2.client.registration.appointment.client-id=pet-health-analyzer-service
spring.security.oauth2.client.registration.appointment.client-secret=${KEYCLOAK_CLIENT_SECRET:KndP9iogTlX3TrdkzuPWgZYzztsp9o8D}
spring.security.oauth2.client.registration.appointment.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.appointment.provider=keycloak
spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/clinic-realm}

mqtt.broker=tcp://${MQTT_HOST:localhost}:${MQTT_PORT:1883}
mqtt.client-id=pet-analyzer-client
mqtt.inbound.topic=pet/vitals
mqtt.outbound.topic=pet/anomalies

thresholds.heart-rate-max=200
thresholds.heart-rate-min=30
thresholds.respiration-max=40
thresholds.respiration-min=10
thresholds.distance-from-home-max=10

gateway.url=http://${GATEWAY_HOST:localhost}:${GATEWAY_PORT:8888}
python.url=http://${PYTHON_HOST:localhost}:${PYTHON_PORT:8091}/predict

